name: Update PlayersB Data

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: ["main"]
    paths:
      - "data/**"
      - "scripts/**"
      - "templates/**"
      - ".github/workflows/update-data.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    env:
      FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found; skipping npm install"
          fi

      - name: Test API token
        run: node scripts/test-api.mjs
        env:
          FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}

      - name: Fetch football data
        run: node scripts/fetch-football-data.mjs

      - name: Verify data files exist
        run: |
          echo "=== data/fixtures.json ==="
          wc -l data/fixtures.json
          echo "=== data/standings.json ==="
          wc -l data/standings.json
          echo "=== First standing entry ==="
          node -e "const d=JSON.parse(require('fs').readFileSync('data/standings.json')); console.log(JSON.stringify(Object.keys(d.standings)))"
          echo "=== Haaland in players.json ==="
          node -e "const d=JSON.parse(require('fs').readFileSync('data/players.json')); const p=Object.values(d).find(x=>x.name&&x.name.includes('Haaland')); console.log(JSON.stringify(p))"

      - name: Sync scorers to players
        run: node scripts/sync-scorers.mjs

      - name: Generate site
        run: node scripts/generate-all.mjs

      - name: Commit updated data
        run: |
          git config user.name "playersb-bot"
          git config user.email "bot@playersb.com"
          git add data/fixtures.json data/standings.json data/scorers.json data/players.json data/players-scores.json matches/index.html standings/index.html
          git diff --staged --quiet || git commit -m "chore: auto-update data [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
