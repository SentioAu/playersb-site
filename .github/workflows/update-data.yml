name: Update PlayersB Data

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: ["main"]
    paths:
      - "data/**"
      - "scripts/**"
      - "templates/**"
      - ".github/workflows/update-data.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

# Prevent overlapping runs from racing on `git push` to main.
# Keep the in-flight run; cancel any newer pending one.
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found; skipping npm install"
          fi

      - name: Test API token
        run: node scripts/test-api.mjs
        env:
          FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}

      - name: Fetch football data
        run: node scripts/fetch-football-data.mjs

      - name: Verify data files exist
        run: |
          echo "=== data/fixtures.json ==="
          wc -l data/fixtures.json
          echo "=== data/standings.json ==="
          wc -l data/standings.json
          echo "=== First standing entry ==="
          node -e "const d=JSON.parse(require('fs').readFileSync('data/standings.json')); console.log(JSON.stringify(Object.keys(d.standings)))"
          echo "=== Haaland in players.json ==="
          node -e "const d=JSON.parse(require('fs').readFileSync('data/players.json')); const p=Object.values(d).find(x=>x.name&&x.name.includes('Haaland')); console.log(JSON.stringify(p))"

      - name: Sync scorers to players
        run: node scripts/sync-scorers.mjs

      - name: Generate site
        run: node scripts/generate-all.mjs

      - name: Refresh data health snapshot
        run: node scripts/check-data-health.mjs --write-health
        continue-on-error: true

      - name: Commit updated data and pages
        run: |
          git config user.name "playersb-bot"
          git config user.email "bot@playersb.com"
          # Stage the full set of regenerated data + HTML so feed.xml,
          # sitemap.xml, players/, teams/, etc. don't drift behind data/.
          git add \
            data/ \
            sitemap.xml \
            feed.xml \
            robots.txt \
            llms.txt \
            llms-full.txt \
            index.html \
            matches/ \
            standings/ \
            players/ \
            teams/ \
            positions/ \
            competitions/ \
            legacy/ \
            fantasy/ \
            archive/ \
            learn/ \
            glossary/ \
            embed/ \
            sports/ \
            tools/ \
            about/ \
            privacy/ \
            terms/ \
            contact/ \
            compare/ \
            2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update data [skip ci]"
            for attempt in 1 2 3 4; do
              if git push; then
                echo "push ok on attempt $attempt"
                break
              fi
              echo "push failed on attempt $attempt; refetching and retrying"
              git fetch origin main
              git rebase origin/main || { git rebase --abort; exit 1; }
              sleep $((2 ** attempt))
            done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on failure
        if: failure() && env.ALERT_WEBHOOK_URL != ''
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "{\"text\":\"PlayersB update-data workflow failed: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}" \
            "$ALERT_WEBHOOK_URL" || true
