name: Generate sitemap.xml

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "players/**"
      - "compare.html"
      - "tools.html"
      - "learn.html"
      - "about.html"
      - "contact.html"
      - "privacy.html"
      - "terms.html"
      - "scripts/generate-sitemap.mjs"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

# Serialize against update-data so we never race on `git push`.
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate sitemap.xml
        run: node scripts/generate-sitemap.mjs

      - name: Commit sitemap.xml (if changed)
        run: |
          git config user.name "playersb-bot"
          git config user.email "playersb-bot@users.noreply.github.com"
          git add sitemap.xml
          git diff --cached --quiet || git commit -m "chore: update sitemap.xml"
          for attempt in 1 2 3 4; do
            if git push; then break; fi
            git fetch origin main && git rebase origin/main || { git rebase --abort; exit 1; }
            sleep $((2 ** attempt))
          done
